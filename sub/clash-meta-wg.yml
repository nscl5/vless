mixed-port: 7890
ipv6: false
allow-lan: true
mode: Rule
log-level: info
external-controller: 0.0.0.0:9090

dns:
  enabled: true
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  proxy-server-nameserver:
    - 8.8.8.8#DIRECT
    - 1.1.1.1#DIRECT
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - 1.1.1.1
  direct-nameserver:
    - 8.8.8.8#DIRECT
tun:
  enable: true
  stack: mixed
  auto-route: true
  strict-route: true
  endpoint-independent-nat: false
  auto-detect-interface: true
  dns-hijack:
    - any:53
    - tcp://any:53
  mtu: 9000

warp-dialer-common: &warp-dialer-common
  type: wireguard
  ip: 172.16.0.3/32
  ip-version: ipv4
  private-key: IMUqKuFuoHdFmXy3vNPUCaXBbF6EuF4FjPR5fwHByXo=
  public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
  allowed-ips:
    - 0.0.0.0/0
  reserved: +aOS
  udp: true
  mtu: 1280
  amnezia-wg-option:
    jc: 3
    jmin: 10
    jmax: 50
    s1: 0
    s2: 0
    h1: 1
    h2: 2
    h4: 3
    h3: 4
    i1: <b >
    i2: <b >

warp-entry-common: &warp-entry-common
  type: wireguard
  ip: 172.16.0.2/32
  ip-version: ipv4
  private-key: cJHzVKteCH4l+5vpr8KeNi40HBX6Opm74J8Pbi495Wg=
  public-key: bmXOC+F1FxEMF9dyiK2H5/1SUtzH0JuVo51h2wPfgyo=
  allowed-ips:
    - 0.0.0.0/0
  reserved: KPvS
  udp: true
  mtu: 1280

masque-common: &masque-common
  type: masque
  private-key: MHcCAQEEIOkcsGqzwUFIGp+Je205ipuWNfma1yqMRvahFSXj9mG5oAoGCCqGSM49AwEHoUQDQgAEdNtk2zEZ9eDjbUfgjuM9oV9inJ9CiY8J9Nx6ZvxSm8mXcm52wy+ql1+PTrwkFKH948jv53PWsSqh1GekL8HKew==
  public-key: MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEIaU7MToJm9NKp8YfGxR6r+/h4mcG7SxI8tsW8OR1A5tv/zCzVbCRRh2t87/kxnP6lAy0lkr7qYwu+ox+k3dr6w==
  ip: 172.16.0.2
  ipv6: 2606:4700:110:8142:4b68:f1cd:25f:56b6
  mtu: 1280
  udp: true
  remote-dns-resolve: true
  dns:
    - 1.1.1.1
    - 1.0.0.1

proxies:
- name: IR-DIALER-01
  <<: *warp-dialer-common
  server: 8.6.112.4
  port: 1074

- name: EU-ENTRY-01
  <<: *warp-entry-common
  server: 8.6.112.7
  port: 908
  dialer-proxy: IR-DIALER-01

- name: IR-DIALER-02
  <<: *warp-dialer-common
  server: 188.114.97.237
  port: 500

- name: EU-ENTRY-02
  <<: *warp-entry-common
  server: 8.6.112.203
  port: 945
  dialer-proxy: IR-DIALER-02

- name: IR-DIALER-03
  <<: *warp-dialer-common
  server: 8.6.112.226
  port: 942

- name: EU-ENTRY-03
  <<: *warp-entry-common
  server: 8.6.112.25
  port: 894
  dialer-proxy: IR-DIALER-03

- name: IR-DIALER-04
  <<: *warp-dialer-common
  server: 8.6.112.198
  port: 1387

- name: EU-ENTRY-04
  <<: *warp-entry-common
  server: 8.6.112.143
  port: 3138
  dialer-proxy: IR-DIALER-04

- name: MASQUE
  <<: *masque-common
  server: 162.159.198.2
  port: 443
  sni: 4pda.to

- name: MASQUE-H2
  <<: *masque-common
  server: 162.159.198.2
  port: 443
  sni: 4pda.to
  network: h2

proxy-groups:
- name: ⚪ PROXIES
  type: select
  icon: https://www.vectorlogo.zone/logos/cloudflare/cloudflare-icon.svg
  proxies:
    - 🇮🇷 AUTO-IR-DIALER
    - 🇪🇺 AUTO-EU-ENTRY
    - MASQUE
    - MASQUE-H2
    - DIRECT
    - IR-DIALER-01
    - IR-DIALER-02
    - IR-DIALER-03
    - IR-DIALER-04
    - EU-ENTRY-01
    - EU-ENTRY-02
    - EU-ENTRY-03
    - EU-ENTRY-04

- name: 🇮🇷 AUTO-IR-DIALER
  type: url-test
  url: https://www.gstatic.com/generate_204
  icon: https://pub-b3ab4c8172fb44e29854df3435aa223d.r2.dev/ir.svg
  interval: 180
  tolerance: 50
  proxies:
    - IR-DIALER-01
    - IR-DIALER-02
    - IR-DIALER-03
    - IR-DIALER-04

- name: 🇪🇺 AUTO-EU-ENTRY
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 25
  tolerance: 50
  icon: https://pub-b3ab4c8172fb44e29854df3435aa223d.r2.dev/eu.svg
  proxies:
    - EU-ENTRY-01
    - EU-ENTRY-02
    - EU-ENTRY-03
    - EU-ENTRY-04

rules:
  - DOMAIN-SUFFIX,ir,DIRECT
  - DOMAIN-KEYWORD,sheypoor,DIRECT
  - DOMAIN-KEYWORD,divar,DIRECT
  - DOMAIN-SUFFIX,digikala.com,DIRECT
  - DOMAIN-SUFFIX,aparat.com,DIRECT
  - DOMAIN-SUFFIX,irancell.ir,DIRECT
  - DOMAIN-SUFFIX,mci.ir,DIRECT
  - DOMAIN-SUFFIX,shaparak.ir,DIRECT
  - DOMAIN-SUFFIX,sep.ir,DIRECT
  - DOMAIN-SUFFIX,bmi.ir,DIRECT
  - DOMAIN-SUFFIX,bpm.bankmellat.ir,DIRECT
  - DOMAIN-SUFFIX,santander.ir,DIRECT
  - DOMAIN-KEYWORD,bank,DIRECT
  - GEOIP,IR,DIRECT,no-resolve
  - MATCH,⚪ PROXIES
ntp:
  enable: true
  server: time.cloudflare.com
  port: 123
  interval: 30
