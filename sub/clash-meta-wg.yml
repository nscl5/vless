proxy-groups:
- name: ⚪ PROXIES
  type: select
  proxies:
  - 🇮🇷 AUTO-IR-ENTRY
  - 🇪🇺 AUTO-EU-DIALER
  - DIRECT
  - IR-ENTRY-01
  - IR-ENTRY-02
  - IR-ENTRY-03
  - IR-ENTRY-04
  - IR-ENTRY-05
  - IR-ENTRY-06
  - EU-DIALER-01
  - EU-DIALER-02
  - EU-DIALER-03
  - EU-DIALER-04
  - EU-DIALER-05
  - EU-DIALER-06
- name: 🇪🇺 AUTO-EU-DIALER
  type: url-test
  url: https://www.gstatic.com/generate_204
  interval: 25
  tolerance: 50
  timeout: 5000
  max-failed-times: 3
  proxies:
  - EU-DIALER-01
  - EU-DIALER-02
  - EU-DIALER-03
  - EU-DIALER-04
  - EU-DIALER-05
  - EU-DIALER-06
- name: 🇮🇷 AUTO-IR-ENTRY
